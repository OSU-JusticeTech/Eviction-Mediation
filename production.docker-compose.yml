services:
  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: '${DB_PASSWORD:-StrongPassword1}'
      MSSQL_USER: 'mssql'
    ports:
      - '${DB_PORT:-1433}:1433'
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          '/opt/mssql-tools/bin/sqlcmd',
          '-S',
          'localhost',
          '-U',
          '${DB_USER:-sa}',
          '-P',
          '${DB_PASSWORD:-StrongPassword1}',
          '-Q',
          'SELECT 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 80s

  web:
    image: eviction-mediation-web-production
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: '${RAILS_ENV:-production}'
      DB_ADAPTER: sqlserver
      DB_HOST: '${DB_SERVICE:-db}'
      DB_PORT: '${DB_PORT:-1433}'
      DB_USERNAME: '${DB_USER:-sa}'
      DB_PASSWORD: '${DB_PASSWORD:-StrongPassword1}'
      RAILS_MASTER_KEY: '${RAILS_MASTER_KEY}'
      # Add other production environment variables as needed
      RAILS_LOG_TO_STDOUT: 'true'
      RAILS_SERVE_STATIC_FILES: 'true'

volumes:
  sqlserver_data:
    driver: local
