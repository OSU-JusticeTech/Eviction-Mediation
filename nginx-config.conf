upstream app {
    server 127.0.0.1:3000;
}


server {
    server_name example.com; # Replace with real domain
    listen 443 ssl;
    ssl_certificate /path/to/your/fullchain.pem; # Replace with actual path to your certificate
    ssl_certificate_key /path/to/your/privkey.pem; # Replace with actual path to your private key

    # WebSocket support for ActionCable
    location /cable {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;

        # WebSocket timeout settings
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://app;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        Host $host;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header                X-Forwarded-Host $host;
        proxy_set_header                X-Forwarded-Server $host;
        proxy_ssl_server_name   on;

        proxy_set_header        SSL_PROTOCOL $ssl_protocol;
        add_header                              'Content-Security-Policy' 'upgrade-insecure-requests';
    }

}

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}
